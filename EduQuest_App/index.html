    /* --- CLASES DE COLORES POR MATERIA --- */
.c-mat { color: var(--mat); } 
.bg-mat { background: rgba(255,107,53,0.15); border: 1px solid var(--mat); }

.c-len { color: var(--len); } 
.bg-len { background: rgba(62,207,207,0.15); border: 1px solid var(--len); }

.c-soc { color: var(--soc); } 
.bg-soc { background: rgba(247,183,49,0.15); border: 1px solid var(--soc); }

.c-nat { color: var(--nat); } 
.bg-nat { background: rgba(76,217,123,0.15); border: 1px solid var(--nat); }

/* Esta es la nueva para los Exámenes */
.bg-rot { background: rgba(162, 89, 255, 0.2); border: 1px solid var(--rot); color: white; }

/* Estilo base para la etiqueta de materia en el juego */
.subject-pill {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 50px;
  font-weight: 800;
  margin-bottom: 20px;
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
	
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; overflow-x: hidden; }
    #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(ellipse at 20% 50%, rgba(108,63,232,.15) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(62,207,207,.10) 0%, transparent 50%); }
    #app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 0 0 80px; display: flex; flex-direction: column; }
    
    .header { padding: 20px 20px 12px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Fredoka One', cursive; font-size: 1.6rem; background: linear-gradient(135deg, #A259FF, #3ECFCF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .coins-badge { display: flex; align-items: center; gap: 6px; background: var(--card2); border: 2px solid var(--soc); border-radius: 50px; padding: 6px 14px; font-weight: 800; color: var(--soc); }

    .screen { display: none; flex-direction: column; padding: 0 20px; flex: 1; animation: fadeIn .4s ease; }
    .screen.active { display: flex; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .hero-title { font-family: 'Fredoka One', cursive; font-size: 2.8rem; line-height: 1.1; margin: 24px 0 8px; text-align: center; }
    .hero-sub { text-align: center; color: var(--muted); margin-bottom: 28px; }

    .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .level-card { background: var(--card); border-radius: var(--radius); padding: 18px; cursor: pointer; border: 2px solid transparent; text-align: center; transition: 0.2s; }
    .level-card.locked { opacity: 0.5; cursor: not-allowed; }
    .level-card.completed { border-color: var(--nat); }

    .intro-subjects-list { margin: 20px 0; }
    .question-card { background: var(--card); border-radius: var(--radius); padding: 22px; margin-bottom: 18px; border: 1.5px solid var(--card2); }
    .options-grid { display: flex; flex-direction: column; gap: 10px; }
    .option-btn { background: var(--card2); border: 2px solid transparent; border-radius: 14px; padding: 14px; color: white; font-weight: 700; cursor: pointer; text-align: left; }
    
    .sort-item { background: var(--card2); border: 2px solid var(--rot); border-radius: 12px; padding: 14px; margin-bottom: 8px; font-family: 'Fredoka One'; cursor: grab; }
    
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(15,10,42,0.95); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--card2); }
    .nav-btn { background: none; border: none; color: var(--muted); font-size: 0.8rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
    .nav-btn.active { color: var(--rot); }

      txt: "Las plantas y sus partes: Las plantas son seres vivos increíbles que no necesitan ir al supermercado porque fabrican su alimento. Cada parte tiene un trabajo: la raíz sujeta la planta al suelo y toma agua; el tallo es como un ascensor que lleva el agua a las hojas; y las hojas son las encargadas de respirar y captar la luz del sol. Algunas plantas también tienen flores y frutos, que es donde guardan sus semillas para que nazcan nuevas plantas." }
  },
9: {
    matematica: { 
      txt: "Estrategias de división (El arte de repartir): Dividir no es más que repartir una cantidad en partes iguales. Imaginá que tenés 12 caramelos y los querés repartir entre 3 amigas. Podés ir dándole uno a cada una hasta que se acaben. Al final, cada una tendrá 4. En lugar de hacer eso uno por uno, usamos la división: 12/3 = 4. Saber dividir te ayuda a ser justa en los juegos y a organizar mejor tus cosas. ¡Es el superpoder de compartir!" },
    lengua: { 
      txt: "Familias de palabras (Parientes cercanos): Las palabras también tienen familia. Una Familia de Palabras es un grupo de palabras que nacen de una misma 'palabra mamá' (llamada raíz) y comparten un significado parecido. Ejemplo: De la palabra PAN, nacen: Panadero, panadería, pancito y panificadora. Si conocés a la 'palabra mamá', ¡es mucho más fácil saber cómo se escriben sus hijas y qué significan!" },
    sociales: { 
      txt: "Circuitos productivos I (La Materia Prima): ¿Te preguntaste alguna vez cómo llega la leche a tu heladera o el algodón a tu remera? Todo empieza con la Materia Prima. Es el elemento natural que el hombre saca de la naturaleza: la leche de la vaca, la lana de la oveja o la madera del árbol. Este es el primer paso de un gran viaje llamado 'Circuito Productivo', donde lo natural se transforma en algo que usamos todos los días." },
    naturales: { 
      txt: "Fotosíntesis básica (Plantas que cocinan): A diferencia de nosotros, las plantas no van al súper; ellas fabrican su propio alimento. Este proceso se llama Fotosíntesis. Para hacerlo, necesitan tres ingredientes mágicos: Luz del Sol, Agua y un gas del aire llamado Dióxido de Carbono. Con todo eso, la planta 'cocina' su energía y, de paso, nos regala Oxígeno para que nosotros podamos respirar. ¡Son las mejores cocineras del planeta!" }
  },

11: {
    matematica: { 
      txt: "Números hasta el 50.000: ¡Ya estamos manejando números de cinco cifras! Llegar al 50.000 es como llenar cinco estadios de fútbol enteros con personas. Lo más importante aquí es el valor posicional: entender que un '5' no vale lo mismo si está al final (5 unidades) que si está al principio (50.000 unidades). Dominar estos números grandes te va a permitir entender desde el precio de una consola de juegos hasta la cantidad de habitantes de una ciudad. ¡Es el lenguaje de las grandes cantidades!" },
    lengua: { 
      txt: "El párrafo y la sangría: Un párrafo es como un 'equipo' de oraciones que trabajan juntas para explicar una idea principal. Para que el lector sepa dónde empieza una nueva idea, usamos la sangría, que es ese pequeño espacio vacío al comienzo de la primera línea. Organizar nuestros textos en párrafos con sangría hace que nuestras historias y tareas sean mucho más claras, ordenadas y agradables de leer para los demás." },
    sociales: { 
      txt: "Circuitos productivos II (La Industria): Después de obtener la materia prima de la naturaleza (como el cuero de la vaca o el algodón de la planta), esta viaja a las fábricas para su transformación industrial. Aquí, gracias al trabajo de muchas personas y al uso de máquinas y tecnología, la materia prima se convierte en un producto elaborado, como unas zapatillas o una remera. Entender esta etapa nos ayuda a valorar todo el esfuerzo y los procesos que ocurren antes de que un producto llegue a los negocios." },
    naturales: { 
      txt: "El Reino Fungi: Los hongos forman un reino propio llamado Fungi. A diferencia de las plantas, no pueden fabricar su propio alimento con el sol, y a diferencia de los animales, no se desplazan para buscar comida. Se alimentan descomponiendo restos de hojas, madera o alimentos, lo que los convierte en los grandes 'recicladores' de la naturaleza. Algunos son grandes como los champiñones y otros son microscópicos como las levaduras que usamos para hacer el pan." }
},
12: {
    matematica: { 
      txt: "Ángulos (Recto, Agudo y Obtuso): Un ángulo es, simplemente, la 'esquina' o abertura que se forma donde dos líneas se cruzan. Los ves en todos lados: en las agujas de un reloj, en una porción de pizza o al abrir una puerta. El ángulo recto es el más famoso, porque es perfecto como la esquina de tu cuaderno (90°). Si es más cerradito y pinchudo, se llama agudo; y si es bien abierto y bosteza, se llama obtuso. Saber identificarlos es el primer paso para ser una gran arquitecta o diseñadora." },
    lengua: { 
      txt: "Los Verbos I: El Infinitivo (El nombre de la acción): Los verbos son las palabras más importantes de nuestras oraciones porque son el 'motor': expresan todo lo que hacemos, sentimos o lo que sucede a nuestro alrededor. Palabras como saltar, correr, estudiar, reír o soñar son verbos. Pero, ¿qué es el Infinitivo? Es la forma básica del verbo, su nombre original cuando todavía nadie está realizando la acción. Es como el verbo 'en pijama' antes de salir a trabajar. Es fundamental conocerlo porque así es como aparecen los verbos en el diccionario. Para reconocer un infinitivo, solo tenés que mirar cómo termina la palabra. En nuestro idioma, todos los infinitivos se dividen en tres grandes grupos o 'familias': 1ª Conjugación (Terminan en -AR): Como jugar, cantar o saltar. 2ª Conjugación (Terminan en -ER): Como comer, leer o correr. 3ª Conjugación (Terminan en -IR): Como reír, dormir o escribir. Saber identificar el infinitivo es como tener una brújula: nos ayuda a entender cómo cambia el verbo cuando decimos 'yo juego' (del verbo jugar) o 'nosotros comimos' (del verbo comer). ¡Es la base para escribir y hablar como una verdadera experta!" },
    sociales: { 
      txt: "Problemas ambientales regionales: La naturaleza es nuestro hogar, pero a veces las personas realizamos actividades que la dañan sin darnos cuenta. Los problemas ambientales aparecen cuando el aire, el agua o el suelo se ensucian (contaminación) o cuando se cortan demasiados árboles (deforestación). En nuestra región, esto puede afectar los ríos donde nos bañamos o el aire que respiramos. Aprender sobre estos problemas es el primer paso para convertirnos en 'guardianes del planeta' y buscar ideas para cuidar el lugar donde crecemos." },
    naturales: { 
      txt: "El microscopio y lo invisible: Existen seres vivos y estructuras tan pequeñas que nuestros ojos no pueden verlos. El microscopio es un instrumento asombroso que usa lentes potentes para 'agrandar' esas imágenes miles de veces. Gracias a él, podemos descubrir el mundo de los microbios, las bacterias y las células que forman nuestro cuerpo. Es la herramienta principal de los científicos para entender cómo funcionan los seres vivos por dentro y cómo combatir enfermedades." }
},
13: {
    matematica: { 
      txt: "Fracciones II (Medios, Cuartos y Octavos): Ya sabés que las fracciones son partes de un entero. Ahora vamos a ver cómo se relacionan entre ellas. ¿Sabías que si juntás dos cuartos de kilo de helado tenés exactamente medio kilo? ¿O que si cortás un alfajor en ocho pedacitos, cada uno es un octavo? Aprender estas equivalencias te sirve para ser súper precisa cuando cocinás una receta rica, cuando vas a la fiambrería o cuando tenés que repartir algo entre muchos amigos de forma justa." },
    lengua: { 
      txt: "Sinónimos y Antónimos: Para que nuestros textos no sean aburridos y no repitan siempre las mismas palabras, usamos los sinónimos, que son palabras distintas con significados parecidos (como 'lindo' y 'bello'). Por otro lado, los antónimos son palabras que significan lo opuesto (como 'alto' y 'bajo'). Usarlos correctamente nos da un vocabulario mucho más rico y nos permite expresar exactamente lo que queremos decir." },
    sociales: { 
      txt: "El Municipio y sus funciones: ¿Alguna vez te preguntaste quién cuida las plazas, quién arregla los semáforos o quién junta la basura de tu cuadra? Esa es la tarea del Municipio. Es el equipo de gobierno más cercano a tu casa, liderado por el Intendente. Su trabajo es organizar la ciudad para que todos vivamos mejor, cuidando que los hospitales funcionen y que las calles estén iluminadas. Conocer cómo funciona el municipio te ayuda a entender que vos también podés participar para que tu barrio esté cada día más lindo." },
    naturales: { 
      txt: "El Sistema Digestivo: Nuestro cuerpo necesita energía para jugar y estudiar, y esa energía viene de la comida. El sistema digestivo es el encargado de desarmar los alimentos en 'pedacitos' minúsculos llamados nutrientes. Todo comienza en la boca con los dientes, sigue por el esófago hasta el estómago (que funciona como una licuadora) y termina en los intestinos, donde el cuerpo absorbe lo bueno y descarta lo que no sirve. ¡Es una verdadera fábrica de procesamiento!" }
  },
14: {
    matematica: { 
      txt: "Multiplicación por 10, 100 y 1.000: Este es el 'truco de magia' favorito de los matemáticos. No hace falta hacer cuentas largas: para multiplicar por 10, 100 o 1.000, solo tenés que escribir el número original y agregarle los ceros que correspondan al final. Por ejemplo, si tenés 5 billetes de 100, tenés un 5 con dos ceros: ¡500! Este atajo te va a dar una velocidad increíble para resolver cálculos mentales y manejar dinero como una experta." },
    lengua: { 
      txt: "Comprensión de Textos: La Noticia (¡Convertite en Periodista!): ¿Alguna vez te preguntaste cómo nos enteramos de las cosas asombrosas que pasan en el mundo? Para eso existen las noticias. Una noticia es un texto que nos cuenta un hecho que es real (no es un invento), importante para los demás y que sucedió hace muy poquito tiempo. Pero leer una noticia es como ser una detective: para entenderla perfectamente, tenés que encontrar las 6 piezas del rompecabezas. Si lográs responder estas preguntas, ¡nadie te va a poder engañar con lo que leés!: ¿Qué pasó? (El hecho: ¿Hubo un rescate? ¿Se descubrió un planeta?). ¿Quiénes participaron? (Los protagonistas: personas, animales o instituciones). ¿Dónde ocurrió? (El lugar: una ciudad, el espacio, un bosque). ¿Cuándo pasó? (El tiempo: ayer, hoy a la mañana, el lunes pasado). ¿Cómo sucedió? (La forma en que pasaron las cosas, paso a paso). ¿Por qué? (La razón o el motivo que causó todo). Las noticias suelen tener un Título bien grande para llamar tu atención y a veces una Foto con un epígrafe (un textito abajo) que nos ayuda a imaginar mejor la escena. Saber leer noticias te permite estar siempre informada, conocer otras realidades y entender los cambios que ocurren en nuestro país y en todo el planeta. ¡A buscar esas 6 respuestas!" },
    sociales: { 
      txt: "Recursos No Renovables: La Tierra nos regala tesoros que usamos para tener energía, como el petróleo (para la nafta de los autos) o el gas (para cocinar). Pero hay un secreto: estos son recursos no renovables, lo que significa que la naturaleza tardó millones de años en fabricarlos y, si los usamos todos, ¡no volverán a crecer! Por eso es tan importante aprender a no derrocharlos y a empezar a usar energías 'limpias' como la del sol o la del viento, que nunca se terminan." },
    naturales: { 
      txt: "El Sistema Respiratorio: Respirar es algo que hacemos sin pensar, pero es vital para vivir. El sistema respiratorio permite que el oxígeno del aire entre a nuestro cuerpo y que el dióxido de carbono (que no nos sirve) salga. El aire entra por la nariz o boca, baja por la tráquea y llega a los pulmones, que se inflan como globos. Allí, el oxígeno pasa a la sangre para ser repartido a todo el cuerpo." }
  },
15: {
    matematica: { 
      txt: "La División con Resto: Dividir es repartir, pero a veces la vida no es exacta y 'sobra algo'. Imaginá que tenés 10 caramelos para repartir entre 3 amigas: le das 3 a cada una, ¡pero te sobra uno! Ese uno que queda solito se llama resto. Entender el resto es fundamental para resolver problemas de la vida real, como saber cuántas cajas necesitás para guardar tus juguetes o cuántos micros hacen falta para un viaje escolar sin que nadie se quede afuera." },
    lengua: { 
      txt: "Cartas (y Correos Electrónicos): Puentes de Palabras: ¿Alguna vez recibiste una carta con tu nombre o un mail con una noticia linda? Aunque hoy usamos mucho el chat del celular, las cartas y los correos electrónicos (mails) siguen siendo formas muy especiales de comunicarnos, especialmente cuando queremos contar algo con más detalle o de manera más organizada. Escribir una carta es como armar un rompecabezas de atención y cariño. Para que la persona que lo recibe nos entienda perfectamente, ambos formatos comparten una estructura que debemos respetar: Lugar y Fecha: Para que sepan desde dónde escribimos y qué día fue. Saludo: Es la entrada. Puede ser cariñoso ('¡Hola, Abu!') o más formal ('Estimado Director:'). Cuerpo del mensaje: ¡Acá va lo más importante! Es donde contás tus historias, tus ideas o hacés tus pedidos. Despedida: El cierre. Puede ser con un beso, un abrazo o un 'Atentamente' si es para alguien que no conocemos tanto. Firma: ¡Tu nombre! Para que no queden dudas de quién es la autora. La gran diferencia es que la carta viaja en un sobre de papel con una estampilla, y el mail viaja a la velocidad de la luz por internet. Aprender a escribirlos te permite estar cerca de personas que están lejos y expresar lo que sentís de una forma clara y hermosa. ¡Animate a escribir tu primer mensaje!" },
    sociales: { 
      txt: "Población (¿Quiénes somos?): La población no es solo un número; somos todas las personas que compartimos este país: niños como vos, abuelos, personas que vinieron de otros países y familias de todas las formas. Para saber cuántos somos y qué necesitamos (como más escuelas o más parques), se hacen los Censos. Estudiar a la población nos permite descubrir nuestra historia, nuestras diferencias y entender que, aunque todos somos distintos, formamos una gran comunidad que debe ayudarse entre sí." },
    naturales: { 
      txt: "El Sistema Circulatorio (¡el gran transportista de la vida!): Imaginá que dentro de tu cuerpo existe una red de 'autopistas' infinitas que llegan a todos lados. Por esas rutas viaja la sangre, que es el transporte oficial de tu organismo. Este sistema es el Circulatorio y tiene una misión vital: llevar oxígeno y nutrientes a cada rincón, ¡desde la punta de tu pelo hasta el dedo gordo del pie! Pero todo transporte necesita un motor, y el nuestro es el más asombroso de todos: El Corazón. El Corazón: Es un músculo incansable, del tamaño de tu puño cerrado, que late sin parar (¡incluso cuando dormís!). Su trabajo es 'bombear', es decir, empujar la sangre con fuerza para que circule por todo el cuerpo. Las Venas y Arterias: Son los tubitos por donde viaja la sangre. Las arterias llevan la sangre 'nueva' con oxígeno, y las venas traen la sangre de vuelta para que se limpie. Limpieza de Desechos: Además de llevar cosas buenas, el sistema circulatorio también funciona como un 'camión de basura': recoge los desechos que tus células ya no necesitan para que el cuerpo pueda eliminarlos. ¡Es el sistema de transporte más eficiente del mundo! Gracias a él, tus músculos tienen fuerza para correr y tu cerebro tiene energía para aprender cosas nuevas en esta App. Cuando hacés ejercicio y sentís que tu corazón late más rápido, es porque está trabajando extra para que tus músculos reciban más energía. ¡Cuidalo haciendo mucha actividad física y comiendo sano!" }
  },
16: {
    matematica: { 
      txt: "El Perímetro (Midiendo bordes): Imaginá que querés ponerle una cinta de colores a todo el borde de tu tablet o una cerca a la casita de tu mascota. Para saber cuánta cinta o madera tenés que comprar, necesitás conocer el perímetro. El perímetro es simplemente la suma de todos los lados de una figura. Si tenés un cuadrado y cada lado mide 5 cm, sumás 5 + 5 + 5 + 5 y ¡listo!, tenés 20 cm de perímetro. Es como 'caminar' por todo el borde de una forma y contar cuántos pasos diste." },
    lengua: { 
      txt: "Prefijos y Sufijos (Fábrica de palabras): Las palabras son como piezas de un juego de construcción. A veces, una palabra cortita (palabra raíz) puede transformarse en una nueva si le agregamos 'pedacitos'. Prefijos: Se pegan adelante. Si a 'activa' le agregás hiper-, tenemos la palabra hiperactiva (es, decir muy activa). Si a 'igual' le ponés des-, es desigual (algo que no es igual). Los prefijos son, están dados y son los siguientes: 'des-', 'anti-', 're-', 'sub-', 'pre-', 'inter'. Sufijos: Se pegan atrás. Si a 'flor' le agregás -ero, tenés un florero. Si a 'pan' le ponés -cito, tenés una pancito, un pan chiquito. ¡Es como magia para crear vocabulario!" },
    sociales: { 
      txt: "Nómades y Sedentarios (¿Dónde vivimos?): Hace miles de años, no había ciudades. Los primeros grupos humanos eran Nómades: no tenían una casa fija, se mudaban siguiendo a los animales que cazaban y buscaban frutos según la estación. Eran grandes viajeros. Después, descubrieron que podían plantar semillas y criar animales, y se volvieron Sedentarios: construyeron casas firmes y se quedaron en un lugar para siempre. Esa decisión fue el comienzo de los pueblos y ciudades que conocemos hoy." },
    naturales: { 
      txt: "El Sistema Excretor (La limpieza interna): Tu cuerpo es como una casa que genera basura todos los días (desechos que sobran de la comida y el aire). El Sistema Excretor es el encargado de sacar esa basura para que no te enfermes. Los protagonistas son los Riñones, que parecen dos porotos mágicos que filtran tu sangre todo el tiempo. Lo que no sirve lo transforman en orina (pis) y lo mandan a la vejiga para expulsarlo. ¡Es un sistema de limpieza que nunca descansa!" }
  },
17: {
    matematica: { 
      txt: "Fracciones III Suma de fracciones iguales (Repartiendo con amigos): Sumar fracciones es muy fácil si todas tienen el mismo número abajo (denominador). Imaginate que cortás una pizza en 8 porciones iguales. Si vos te comés 1 porción (1/8) y tu amiga se come 2 porciones (2/8), entre las dos comieron 3 porciones de las 8 que había (3/8). ¿Viste? El número de abajo se queda igual porque la pizza sigue cortada en 8, ¡solo sumamos lo que usamos!" },
    lengua: { 
      txt: "La Fábula y la Moraleja (Animales que enseñan): Las fábulas son cuentos muy antiguos y especiales. Sus personajes casi siempre son animales que hablan, como una liebre presumida o una tortuga esforzada. Lo más importante de la fábula no es solo la historia, sino la Moraleja. La moraleja es un consejo o una enseñanza que nos ayuda a ser mejores personas, como 'no hay que burlarse de los demás' o 'con esfuerzo se llega lejos'." },
    sociales: { 
      txt: "Diaguitas y Guaraníes (Culturas de nuestra tierra): Antes de que llegaran los barcos de Europa, Argentina estaba llena de pueblos sabios. Los Diaguitas: Vivían en las montañas del norte. Eran ingenieros increíbles: hacían 'escalones' de tierra en los cerros para plantar maíz y zapallo porque el suelo era muy empinado. Los Guaraníes: Vivían en la selva, cerca de los grandes ríos. Eran maestros de la naturaleza: usaban las plantas para curarse y hacían canoas veloces para viajar por el agua. ¡Sus palabras todavía las usamos hoy!" },
    naturales: { 
      txt: "Salud e Higiene (Nuestro escudo protector): La salud no es solo no tener fiebre. Estar sano significa que tu cuerpo y tu mente se sienten bien. Para ayudar a nuestro cuerpo, usamos la higiene. Lavarnos las manos antes de comer elimina 'monstruos' invisibles (microbios) que quieren entrar a nuestra panza. Bañarnos y cepillarnos los dientes es como darle un escudo de protección a nuestra piel y sonrisa. ¡Cuidar tu higiene es quererte a vos misma!" }
  },
18: {
    matematica: { 
      txt: "Metro y Centímetro (¿Cuánto mide?): Si querés medir cuánto creciste, usás el metro. Pero si querés medir cuánto mide tu lápiz favorito, usás el centímetro, porque es más chiquito. Un secreto: el metro es como el 'jefe' y tiene 100 centímetros adentro. En tu regla escolar podés ver los centímetros marcados con numeritos. Saber medir te ayuda a construir cosas, a coser ropa o simplemente a conocer mejor el tamaño de todo lo que te rodea." },
    lengua: { 
      txt: "El Adverbio (Los preguntones): Los adverbios son palabras que responden preguntas sobre la acción. Si preguntás ¿Dónde?, aparecen los de Lugar: aquí, allá, cerca, lejos. (Ejemplo: 'El gato está lejos'). Si preguntás ¿Cuándo?, aparecen los de Tiempo: hoy, ayer, pronto, todavía. (Ejemplo: 'Jugaremos mañana'). Son como lupas que nos dan más información sobre lo que está pasando en la oración." },
    sociales: { 
      txt: "La Conquista (Un choque de mundos muy difícil): Hace unos 500 años, llegaron desde Europa barcos con exploradores que traían armas, armaduras y animales que aquí no se conocían, como los caballos. Este momento se llamó 'La Conquista' y fue un proceso muy doloroso y difícil para los pueblos originarios que ya tenían sus ciudades, sus familias y sus leyes en estas tierras. ¿Por qué fue tan difícil para ellos? La pérdida de la libertad: Los conquistadores obligaron a muchos indígenas a trabajar para ellos en minas o campos, tratándolos muy mal y quitándoles la posibilidad de vivir como ellos querían. Enfermedades nuevas: Los europeos trajeron virus (como la viruela) para los que los cuerpos de los habitantes de América no tenían defensas. Esto hizo que muchísima gente se enfermara gravemente. El respeto por la cultura: A los pueblos originarios se les prohibió hablar sus idiomas, practicar sus religiones y seguir sus costumbres. Les impusieron una forma de vida totalmente distinta a la fuerza. A pesar de todo este sufrimiento, muchos pueblos lucharon valientemente para defender su tierra y su forma de ser. Por eso, hoy estudiamos este tema no como un simple viaje, sino como un momento de gran resistencia. Recordar lo que sufrieron nos ayuda a entender por qué hoy es tan importante respetar la identidad y los derechos de todas las personas." },
    naturales: { 
      txt: "Nutrición Saludable (Energía de la buena): Comer no es lo mismo que nutrirse. Nutrirse es darle a tu cuerpo los 'ladrillos' que necesita para crecer. Las frutas y verduras te dan vitaminas (son como el equipo de mantenimiento). La carne, huevos o legumbres te dan proteínas (son los ladrillos para tus músculos). Los cereales y pastas te dan energía rápida para correr. Si comés variado, tu cuerpo va a ser como un auto de carreras: ¡siempre listo y con mucha fuerza!" }
  },
19: {
    matematica: { 
      txt: "Gráficos de barras (Dibujando números): A veces ver muchos números cansa. Para eso inventamos los gráficos de barras. Imaginá que hacés una encuesta sobre el helado favorito: 5 prefieren chocolate, 3 vainilla y 8 dulce de leche. Dibujamos barras de colores: la más alta será la de dulce de leche. De un solo vistazo, sin leer todos los números, ya sabés quién ganó. ¡Es la forma más divertida de organizar información!" },
    lengua: { 
      txt: "Pronombres personales (El reemplazo ideal): Si estamos contando una historia sobre Aitana, no hace falta decir 'Aitana' en cada renglón. Podemos usar Pronombres. En lugar de 'Aitana estudia', decimos 'Ella estudia'. Si hablamos de nosotros, decimos 'Nosotros jugamos'. Palabras como Yo, Vos, Él, Ella, Nosotros y Ellos son los pronombres. Sirven para que lo que escribimos suene más natural y no sea tan repetitivo." },
    sociales: { 
      txt: "La vida en la Colonia (Un viaje en el tiempo a 1810): Imaginá que un día te despertás y no hay ruidos de motores, ni bocinas, ni el zumbido de la heladera. ¡Bienvenida a la época de la Colonia! En 1810, la vida tenía un ritmo mucho más lento, marcado por la luz del sol y el sonido de las carretas sobre las piedras de las calles. ¿Cómo era un día común en Buenos Aires? El agua y el fuego: No había canillas. El Aguatero pasaba con un gran carro tirado por bueyes vendiendo agua que traía del río (¡y había que hervirla!). Tampoco había llaves de luz; cuando bajaba el sol, las casas se iluminaban con velas de grasa que daban una luz bajita y bailarina. Por eso, la gente se acostaba muy temprano. Los pregones en la calle: Las veredas eran el escenario de un 'show' musical. Los vendedores no gritaban, ¡cantaban! '¡Mazamorra caliente para las viejas sin dientes!' o '¡Velas, velitas, para alumbrar las casitas!'. Cada vendedor tenía su propia canción (pregón) para que la gente saliera a comprar desde sus ventanas. ¿A qué jugaban los chicos?: Sin tablets ni tele, la diversión estaba en la calle y en los patios. Los chicos eran expertos en el trompo, el balero y las escondidas. Las nenas solían jugar a las muñecas de trapo o al 'Arroz con leche' en rondas gigantes. ¡El juego era la forma de hacer amigos! Las clases sociales: No todos vivían igual. En las casas grandes con patios con aljibes vivían las familias más ricas (los 'vecinos'), mientras que en las orillas de la ciudad, en casas de barro y paja, vivía la gente más humilde, muchos de ellos esclavos que soñaban con la libertad. En las tertulias (que eran como las fiestas de ahora), las familias se reunían a tomar chocolate caliente, tocar el piano y charlar. Pero en esas charlas, empezaba a crecer una idea muy fuerte: la de ser un país libre. La vida era tranquila, pero el aire ya olía a revolución." },
    naturales: { 
      txt: "Los Sentidos (Tus radares): Para conocer el mundo, tenés 5 sentidos, pero hoy veremos dos muy especiales: La Vista: Tus ojos funcionan como cámaras que captan la luz. Gracias a ellos podés ver los colores, las formas y qué tan lejos están las cosas. El Oído: Tus orejas atrapan las vibraciones que hay en el aire. Esas vibraciones viajan adentro de tu cabeza y se transforman en sonidos: la música, los pájaros o la risa de mamá. ¡Tus sentidos te mantienen conectada con todo!" }
  },

21: {

      txt: "Números hasta el 100.000: ¡Llegamos a las seis cifras! Imagina que cada número es una persona: el número 100.000 es como llenar el estadio de Gimnasia y Estudiantes juntos, ¡y que todavía sobre gente afuera! El secreto para no perderse es separar los miles con un puntito. El '1' en la posición de la centena de mil vale cien veces más que el '1' en la posición de los miles. Dominar estos números te permite entender desde el precio de un auto hasta cuántos granos de arroz hay en un paquete grande." },
    lengua: { 
      txt: "Ortografía (Uso de B y V): Aunque suenan igual, la B y la V tienen 'amigos preferidos' (reglas). Por ejemplo, la B siempre va de la mano con la L y la R (como en bla-nco o bra-zo). La V, en cambio, es muy amiga de la N (como en i-n-vitar o i-n-vierno). Un truco de experta: si una palabra viene de otra que lleva B, ¡ella también la lleva! (de caballo sale caballería). Escribir bien es como peinar tus ideas antes de que salgan a pasear." },
    sociales: { 
      txt: "El Cabildo y la Revolución de Mayo: En mayo de 1810, Buenos Aires era un hervidero. La gente no quería que un Rey que vivía en España, al otro lado del océano, decidiera todo por ellos. Se reunieron frente al Cabildo (que era como la municipalidad de antes) y, aunque llovía mucho, nadie se movió de la plaza hasta que se formó la Primera Junta. Fue el nacimiento de nuestro primer gobierno patrio. Fue un momento de mucha valentía donde los vecinos decidieron que querían ser los dueños de su propio destino." },
    naturales: { 
      txt: "Materiales Sólidos y Líquidos: ¿Por qué una piedra mantiene su forma y el agua se desparrama? Todo depende de cómo están las 'piezas chiquititas' (moléculas) adentro. En los Sólidos, las piezas están tan apretadas y agarradas que no se mueven (por eso un lápiz no cambia de forma solo). En los Líquidos, las piezas están más sueltas y pueden deslizarse unas sobre otras, como si estuvieran bailando. Por eso el agua toma la forma del vaso o de la botella donde la pongas. ¡Es pura física en movimiento!" }

22: {
    matematica: { 
      txt: "Triángulos según sus lados: Los triángulos son las figuras más fuertes de la geometría (¡por eso se usan para construir puentes!). Pero no todos son hermanos gemelos: Equilátero: Es el más prolijo, tiene sus 3 lados exactamente iguales. Isósceles: Tiene 2 lados iguales y uno distinto (parece una porción de pizza flaquita). Escaleno: Es el más rebelde, ¡ninguno de sus 3 lados mide lo mismo! Saber esto es clave para los arquitectos y diseñadores." },
    lengua: { 
      txt: "Tiempos verbales (Pasado y Presente): Los verbos son viajeros del tiempo. Si decís 'Aitana estudió', estamos mirando hacia atrás (Pasado), a algo que ya se terminó. Si decís 'Aitana estudia', está pasando ahora mismo (Presente). Es muy importante usar el tiempo correcto para que los demás sepan si les estás contando una anécdota de ayer o lo que querés hacer en este momento. ¡Tus palabras tienen el poder de moverte por el calendario!" },
    sociales: { 
      txt: "Manuel Belgrano y la Bandera: Belgrano era un hombre muy culto que creía que la educación era el superpoder más grande de los niños. Durante las batallas por la independencia, se dio cuenta de que necesitábamos un color que nos uniera y nos distinguiera de los españoles. Así, a orillas del río Paraná, izó por primera vez la bandera celeste y blanca. No eligió esos colores por el cielo, sino porque eran los colores que ya se usaban en las escarapelas para identificarnos como hermanos de una misma tierra." },
    naturales: { 
      txt: "Mezclas y Separaciones I: En la naturaleza, casi todo está mezclado. Pero hay dos tipos: Heterogéneas: Se notan las partes a simple vista (como una ensalada de frutas o agua con aceite). Homogéneas: Parecen una sola cosa (como el café con leche o el perfume). Lo mejor es que existen trucos para separarlas: usar un colador (filtración), usar un imán si hay metales o dejar que el agua se evapore con el sol. ¡Sos como una científica en su laboratorio personal!" }
  },
23: {
    matematica: { 
      txt: "División por dos cifras I (¡A repartir en grande!): Imaginate que tenés 500 figuritas y las querés repartir entre 25 amigas. ¡Son muchas! Como el 25 es un número grande, usamos un truco de detective que se llama 'redondear': pensás al 25 como si fuera un 20 o un 30 para que sea más fácil calcular mentalmente.El truco de la puntería: Si no sabés cuánto es 500 dividido 25, probás: '¿Entrará 10 veces? 10 x 25 es 250... ¡me falta un montón!'. '¿Entrará 20 veces?'. Es como tirar al blanco: si te pasás del número, probás con uno más chico; si te falta mucho, probás con uno más grande. Lo más importante es escribir los números bien derechitos para no marearte con los que te van sobrando." },
    lengua: { 
      txt: "El Texto Expositivo (El libro que te enseña): A diferencia de un cuento donde hay lobos que hablan o hadas, el Texto Expositivo es el que te cuenta cómo son las cosas en la realidad. ¿Dónde lo ves?: En un libro de animales que te explica qué comen los leones, o en una revista que cuenta cómo se llega a la Luna. ¿Cómo lo reconocés?: Siempre tiene un Título grande, Subtítulos (que son como títulos más chiquitos para organizar el tema) y Fotos con un texto abajo llamado epígrafe que te explica qué estás viendo. No inventa historias, ¡te da información real para que seas una experta!" },
    sociales: { 
      txt: "San Martín y el Cruce de los Andes: José de San Martín fue un estratega increíble. Para liberar a Chile, tuvo que cruzar con más de 5.000 hombres las montañas más altas de América. ¡No tenían camiones ni aviones! Fueron a caballo y mula, llevando comida seca y abrigos pesados para el frío extremo. Fue una hazaña que hoy estudia todo el mundo porque demostró que con organización, compañerismo y un objetivo claro (la libertad), no hay montaña que sea imposible de escalar." },
    naturales: { 
      txt: "El Ciclo del Agua II: El agua que tomás hoy es la misma que existía hace millones de años. ¡Es la gran recicladora! El Sol calienta el agua de los ríos (Evaporación), ese vapor sube y forma las nubes (Condensación), y cuando las nubes están muy pesadas, el agua cae en forma de lluvia o nieve (Precipitación). Este ciclo es fundamental porque limpia el agua y la lleva a lugares donde las plantas y los animales la necesitan para vivir." }
  },
24: {
    matematica: { 
      txt: "Decimales I (Los pesos y los centavos): Cuando acompañás a mamá al súper y ves un precio como $15,50, ese número tiene una coma. ¿Para qué sirve?: La coma es una pared. Del lado izquierdo están los pesos enteros (lo que podés comprar con billetes). Del lado derecho están los centavos, que son como 'pedacitos' de un peso. El secreto: Necesitás juntar 100 centavos para formar 1 peso entero. Si algo cuesta $0,50, es la mitad de un peso. Aprender esto es como tener un 'superpoder' en el quiosco: ¡vas a saber exactamente cuánto vuelto te tienen que dar!" },
    lengua: { 
      txt: "Uso de G y J (El secreto de los sonidos): La G es una letra que cambia de voz según con quién se junte: Voz suave: Cuando está con la A, O, U (Gato, Gota, Gusano). Suena ga, go, gu'. Voz fuerte: Cuando está con la E, I (Gente, Gigante). Ahí suena igual que la J. El truco del guardaespaldas: Si querés que la G suene suave con la E o la I (como en Gue-rra o Gui-tarra), tenés que ponerle una U en el medio. Esa U no se lee, ¡está ahí solo para proteger el sonido suave! La J: Ella es más simple, siempre suena fuerte, como un rugido: Jirafa, Jamón, Jefe." },
    sociales: { 
      txt: "Derechos del Niño: Todos los niños y niñas del mundo tienen una 'armadura invisible' de leyes que los protegen. Tenés derecho a tener un nombre, a una familia que te cuide, a ir a la escuela, a jugar y a que los médicos te curen si te sentís mal. Estos derechos son para todos, sin importar de qué país vengas o qué idioma hables. Conocer tus derechos te ayuda a crecer segura y a respetar también los derechos de los demás." },
    naturales: { 
      txt: "Los imanes y el magnetismo (Fuerzas invisibles): Un imán es un objeto que tiene un 'abrazo invisible' para los metales. Pero tienen una regla de oro: Los Polos: Todos los imanes tienen dos puntas: Norte y Sur. ¿Se pegan o se separan?: Si intentás juntar un Norte con un Norte, vas a sentir que una fuerza invisible los empuja hacia afuera, ¡no quieren estar juntos! Pero si juntás un Norte con un Sur, ¡se pegan volando! A esto los científicos lo llaman: 'Polos opuestos se atraen'. Es la misma fuerza que hace que la brújula siempre marque hacia dónde está el Polo Norte de la Tierra." }
  },
25: {
    matematica: { 
      txt: "Fracciones IV (Fracciones Equivalentes): 'Equivalente' es una palabra difícil que solo significa: 'Valen lo mismo'. Ejemplo rico: Imaginá que tenés un chocolate. Si lo cortás en 2 partes y te comés 1 (1/2), comiste la mitad. Si tu amiga tiene el mismo chocolate, lo corta en 4 partes y se come 2 (2/4), ¡las dos comieron la misma cantidad! Aunque los números sean distintos, la panza se llena igual. Son fracciones que se ven diferentes pero son 'gemelas' en cantidad." },
    lengua: { 
      txt: "La Poesía y la Rima (Música con palabras): La poesía no se lee como una noticia; se lee casi como si estuvieras cantando. La Rima: Es cuando las palabras terminan parecido y hacen 'música'. Por ejemplo: 'La ballena Elena, es gorda y es buena'. Como Elena y buena terminan igual, suena divertido. Sirve para contar cómo nos sentimos o para imaginar mundos lindos usando el sonido de las letras." },
    sociales: { 
      txt: "La Constitución Nacional (El libro de las reglas): Imaginá que jugás a las escondidas pero nadie sabe las reglas: ¡sería un lío! Un país es igual. La Constitución es un libro donde están escritas las reglas para que todos los argentinos vivamos bien. ¿Qué dice?: Dice que todos somos libres, que podemos ir a la escuela, que tenemos que cuidar la naturaleza y cómo se elige al Presidente. Es el 'manual de instrucciones' para que el país funcione con justicia." },
    naturales: { 
      txt: "La Luz y las Sombras (Jugando con el Sol): La luz viaja siempre en línea recta, como una flecha súper veloz. ¿Cómo se hace la sombra?: Cuando vos te ponés frente a una luz, tu cuerpo es como una pared que no la deja pasar. Como la luz no puede atravesarte, del otro lado se forma un espacio oscuro: ¡tu sombra! ¿Por qué cambia?: Si la luz está muy bajita (como cuando el sol se está por ir), tu sombra se estira mucho. Si la luz está justo arriba tuyo, tu sombra se hace un circulito chiquito en tus pies." }
  },
26: {
    matematica: { 
      txt: "Unidades de Peso (El Kilo y el Gramo): ¿Alguna vez ayudaste a pesar las manzanas en la verdulería? Para saber cuánto 'pesa' algo, usamos el Gramo y el Kilo. El Gramo (g): Es muy, muy livianito. Un clip de papel o un caramelito pesan más o menos 1 gramo. Se usa para cosas chiquitas. El Kilo (kg): Es más pesado. Un paquete de arroz o una botella de agua grande pesan 1 kilo. El secreto: ¡Necesitás 1.000 caramelitos de un gramo para que pesen lo mismo que el paquete de arroz! Saber esto te ayuda a entender las recetas de cocina y a saber cuánto cargás en tu mochila." },
    lengua: { 
      txt: "Sujeto y Predicado (¿Quién hace qué?): Toda oración es como una mini-película que tiene dos partes muy importantes. El Sujeto: Es el protagonista de la historia. ¿De quién estamos hablando? (Ejemplo: 'Aiti' o 'El gato'). El Predicado: Es lo que el protagonista está haciendo. (Ejemplo: '...estudia mucho' o '...salta en el sillón'). Si decís: 'Aiti está nadando', Aiti es el sujeto y está nadando es el predicado. ¡Es la base para que tus historias se entiendan perfecto!" },
    sociales: {

27: {
    matematica: { 
      txt: "Cuerpos Geométricos (Figuras que podés tocar): A diferencia de un dibujo plano en un papel, los Cuerpos Geométricos tienen volumen, o sea, ocupan un lugar en el espacio. Ejemplos: Una pelota es una esfera, un dado es un cubo y una caja de cereales es un prisma. Partes: Tienen 'caras' (las paredes), 'aristas' (los bordes o líneas) y 'vértices' (las puntitas donde se juntan las líneas). ¡Mirá a tu alrededor y vas a ver que casi todo lo que ves tiene cuerpo!" },
    lengua: { 
      txt: "Conectores Temporales (Las palabras 'pegamento'): Para que tus cuentos no sean un lío, usamos palabras que ordenan el tiempo. ¿Cómo se usan?: Si contás tu día, decís: 'Primero me lavé la cara, después desayuné y al final me puse a jugar'. Esas palabras (primero, después, luego, finalmente) son los conectores. Sirven para que el que te escucha no se pierda y sepa qué pasó antes y qué pasó después." },
    sociales: {

    naturales: {

  },
28: {
    matematica: { 
      txt: "Multiplicación de 2 cifras (El gran desafío): Multiplicar por números como 24 o 35 parece difícil, pero es solo hacer dos cuentas en una. El secreto: Primero multiplicás por el número de atrás (las unidades). Después, hacés un 'pasito al costado' (dejás un lugar vacío) y multiplicás por el número de adelante. Al final, sumás los dos resultados. Consejo: ¡Escribí los números bien ordenaditos, uno debajo del otro, para que la suma final salga perfecta!" },
    lengua: { 
      txt: "La Crónica Periodística (Contar como un testigo): La crónica es una noticia pero con 'mucho detalle'. ¿Qué hace?: El que la escribe te cuenta lo que pasó minuto a minuto, como si estuviera ahí con vos. Te cuenta el clima, cómo se sentía la gente y qué ruidos había. Se usa mucho para contar viajes, partidos de fútbol o fiestas importantes. ¡Es como una película escrita!" },
    sociales: { 
      txt: "La Inmigración (El viaje de los abuelos): Hace mucho tiempo, miles de personas de países como Italia o España se subieron a barcos gigantes para venir a vivir a Argentina. ¿Por qué vinieron?: Muchos venían porque en sus países había guerras o no tenían comida, y soñaban con una vida mejor. Trajeron sus valijas llenas de ropa, pero también de canciones, recetas de pastas ricas y muchas ganas de trabajar. ¡Muchos de nuestros abuelos o bisabuelos hicieron ese viaje valiente!" },
    naturales: { 
      txt: "Electricidad Estática (Los chispazos mágicos): ¿Alguna vez te dio un 'tironcito' el picaporte o viste que tu pelo se pega a un globo? Eso es la electricidad estática.¿Cómo pasa?: Cuando frotás dos cosas (como un globo en tu pulóver), las cargas eléctricas se amontonan. Al tocar algo, esas cargas saltan de golpe y hacen un ruidito: ¡es como un rayo minúsculo en tus manos! Es una energía que está quieta y de repente salta." }
  },
29: {

31: {

32: {
    matematica: {

    /* --- LÓGICA DE NAVEGACIÓN Y JUEGO --- */
    function navTo(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + screenId).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      if(screenId === 'home') document.querySelector('.nav-btn:nth-child(1)').classList.add('active');
      if(screenId === 'profile') {
        document.querySelector('.nav-btn:nth-child(2)').classList.add('active');
        document.getElementById('stat-coins').textContent = state.coins;
      }
    }

    function renderLevels() {
      const grid = document.getElementById('levels-grid');
      grid.innerHTML = '';
      for (let i = 1; i <= 40; i++) {
        const isLocked = i > 1 && !state.completedLevels.includes(i - 1);
        const card = document.createElement('div');
        card.className = `level-card ${isLocked ? 'locked' : ''} ${state.completedLevels.includes(i) ? 'completed' : ''}`;
        card.innerHTML = `
          <div style="font-size:2rem; margin-bottom:10px;">${isLocked ? '🔒' : '🚀'}</div>
          <div style="font-family:'Fredoka One';">NIVEL ${i}</div>
        `;
        if (!isLocked) card.onclick = () => selectLevel(i);
        grid.appendChild(card);
      }
    }

    function selectLevel(num) {
      state.currentLevel = num;
      currentIntroIndex = 0;
      renderIntroStep();
      navTo('intro');
    }

    function renderIntroStep() {
      const levelNum = state.currentLevel;
      const subjectKey = subjectsOrder[currentIntroIndex];
      const m = subjectMeta[subjectKey];
      const info = (NAP_CONTENT[levelNum] && NAP_CONTENT[levelNum][subjectKey]) || { txt: "¡A repasar!" };

      document.getElementById('intro-badge').textContent = `Misión ${levelNum} • Paso ${currentIntroIndex + 1} de 4`;
      document.getElementById('intro-title').textContent = `Repasamos ${m.label}`;

      const list = document.getElementById('intro-subjects');
      list.innerHTML = `
        <div style="text-align: center; padding: 20px 10px; animation: fadeIn 0.4s ease;">
          <div style="font-size: 4rem; margin-bottom: 15px;">${m.icon}</div>
          <h2 class="${m.colorClass}" style="font-family: 'Fredoka One'; margin-bottom: 15px;">${m.label}</h2>
          <p style="font-size: 1.1rem; line-height: 1.6; color: var(--white); background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
            ${info.txt}
          </p>
        </div>
      `;

      const startBtn = document.getElementById('btn-start-level');
      if (currentIntroIndex < subjectsOrder.length - 1) {
        startBtn.innerHTML = "Siguiente Materia ➔";
        startBtn.onclick = () => { currentIntroIndex++; renderIntroStep(); };
      } else {
        startBtn.innerHTML = "¡Listo, a Jugar! 🎮";
        startBtn.onclick = () => { startLevel(); };
      }
    }

    function startLevel() {
    const levelKey = 'nivel' + state.currentLevel;
    const data = curriculumData[levelKey];
    questionQueue = [];

    // Lógica especial para Niveles de Examen (como el 40)
    if (data.examen_final) {
        questionQueue = [...data.examen_final.map(q => ({...q, subject: 'examen_final'}))];
    } else {
        // Carga normal por materias
        subjectsOrder.forEach(sub => {
            if(data[sub]) {
                questionQueue.push(...data[sub].map(q => ({...q, subject: sub})));
            }
        });
    }

    if (questionQueue.length === 0) {
        console.error("Error: No se encontraron preguntas para el nivel " + state.currentLevel);
        return;
    }

    currentQIndex = 0;
    navTo('game');
    renderQuestion();
}

  /* --- FUNCIONES DE JUEGO --- */

function renderQuestion() {
    document.querySelectorAll('button').forEach(b => b.disabled = false);
    const q = questionQueue[currentQIndex];
    
    // Actualizar Progreso
    document.getElementById('progress-label').textContent = `Pregunta ${currentQIndex + 1} de ${questionQueue.length}`;
    const pct = Math.round((currentQIndex / questionQueue.length) * 100);
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';

    // Actualizar la "píldora" de materia
    const pill = document.getElementById('subject-pill');
    // Verificamos si es un nivel de examen o si la pregunta viene del array examen_final
    if ([10, 20, 30, 40].includes(state.currentLevel) || q.subject === 'examen_final') {
        pill.textContent = `🏆 EXAMEN FINAL`;
        pill.className = `subject-pill bg-rot`; 
    } else {
        const m = subjectMeta[q.subject];
        pill.textContent = `${m.icon} ${m.label}`;
        pill.className = `subject-pill ${m.bgClass} ${m.colorClass}`;
    }

    document.getElementById('q-text').textContent = q.question || q.q;
    
    // Reset de zonas
    ['zone-mc', 'zone-tf', 'zone-fitb', 'zone-sort'].forEach(z => document.getElementById(z).style.display = 'none');
    document.getElementById('feedback-panel').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    // --- LÓGICA DE VISUALIZACIÓN POR TIPO ---
    if(q.type === 'multiple-choice' || q.type === 'intruder' || q.type === 'sequence') {
        const zone = document.getElementById('zone-mc');
        zone.style.display = 'flex';
        zone.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(opt);
            zone.appendChild(btn);
        });

    } else if(q.type === 'true-false') {
        document.getElementById('zone-tf').style.display = 'grid';

    } else if(q.type === 'fill-in-the-blank' || q.type === 'fast') {
        document.getElementById('zone-fitb').style.display = 'block';
        const input = document.getElementById('fitb-input');
        input.value = '';
        setTimeout(() => input.focus(), 100); 

    } else if(q.type === 'sort') {
        document.getElementById('zone-sort').style.display = 'block';
        const list = document.getElementById('sort-list');
        list.innerHTML = '';
        // Mezclamos las opciones para que el usuario tenga que ordenarlas
        [...q.options].sort(() => Math.random() - 0.5).forEach(opt => {
            const item = document.createElement('div');
            item.className = 'sort-item';
            item.textContent = opt;
            list.appendChild(item);
        });
        new Sortable(list, { 
            animation: 150,
            ghostClass: 'sortable-ghost'
        });
    }
}

function checkAnswer(val) {
    const q = questionQueue[currentQIndex];
    let isCorrect = false;

    if (Array.isArray(q.answer)) {
        const valNormalizado = val.map(v => String(v).toLowerCase().trim());
        const ansNormalizado = q.answer.map(v => String(v).toLowerCase().trim());
        isCorrect = JSON.stringify(valNormalizado) === JSON.stringify(ansNormalizado);
    } else {
        isCorrect = String(val).toLowerCase().trim() === String(q.answer).toLowerCase().trim();
    }

    const fb = document.getElementById('feedback-panel');
    fb.style.display = 'block';

    if (isCorrect) {
        fb.style.background = 'rgba(76,217,123,0.2)';
        fb.style.color = 'var(--nat)';
        fb.textContent = '¡Excelente! 🌟 +10 monedas';
        state.coins += 10;
        document.getElementById('coins-display').textContent = state.coins;
        document.getElementById('stat-coins').textContent = state.coins;
        saveProgress(); 
    } else {
        fb.style.background = 'rgba(255,107,53,0.2)';
        fb.style.color = 'var(--mat)';
        const respuestaVisible = Array.isArray(q.answer) ? q.answer.join(', ') : q.answer;
        fb.textContent = '¡Casi! La respuesta era: ' + respuestaVisible;
    }

    document.getElementById('next-btn').style.display = 'block';
    // AQUÍ ACTUALIZAMOS LOS IDs DE LOS BOTONES A DESACTIVAR
    document.querySelectorAll('.option-btn, #btn-true, #btn-false, #btn-fitb, #btn-sort').forEach(b => b.disabled = true);
}

function answerTF(val) { checkAnswer(val); }

function submitFITB() { 
    const input = document.getElementById('fitb-input');
    const val = input.value.trim();
    if(val !== "") {
        checkAnswer(val); 
    }
}

function submitSort() {
    const items = Array.from(document.querySelectorAll('.sort-item')).map(i => i.textContent.trim());
    const q = questionQueue[currentQIndex];
    
    // Comparamos el orden del usuario contra el array de respuesta correcta
    // Usamos JSON.stringify para comparar el contenido de los dos arrays fácilmente
    if (JSON.stringify(items) === JSON.stringify(q.answer)) {
        checkAnswer(q.answer); // Correcto
    } else {
        checkAnswer("INCORRECTO_SORT_TRIGGER"); // Esto disparará el feedback de error
    }
}

function nextQuestion() {
    currentQIndex++;
    if(currentQIndex < questionQueue.length) {
        renderQuestion();
    } else {
        finishLevel();
    }
}
       function finishLevel() {
      if(!state.completedLevels.includes(state.currentLevel)) {
        state.completedLevels.push(state.currentLevel);
        saveProgress(); // GUARDA EL NIVEL COMPLETADO
      }
      navTo('results');
      document.getElementById('result-title').textContent = '¡NIVEL ' + state.currentLevel + ' COMPLETADO!';
      document.getElementById('result-score').textContent = '🪙 ' + state.coins;
      document.getElementById('result-sub').textContent = '¡Sos una verdadera experta, Aitana!';
      renderLevels();
    }

    function goHome() { navTo('home'); }
	window.onload = () => {
      renderLevels();
      navTo('home');
    };
</script>
